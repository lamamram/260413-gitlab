image: ${CI_REGISTRY_IMAGE}/python:${CICD_IMAGE_TAG}

variables:
  CICD_IMAGE_TAG: 3.14.4-slim-trixie
  TRIGGER_CACHE: "off"

stages:
  - installing
  - testing
  - qualifying
  - packaging

generate deps:
  tags:
    - formation
  stage: installing
  script:
    - python -m venv venv
    - source venv/bin/activate
    - pip install -r app/requirements.txt
    - pip install -r app/requirements-dev.txt
  cache:
    key: cache-deps-${CI_COMMIT_BRANCH}
    paths:
      - venv/
    policy: push
  rules:
    - changes:
        - app/requirements.txt
        - app/requirements-dev.txt
    - if: $TRIGGER_CACHE == "on"


.test:
  tags:
    - formation
  stage: testing
  script:
    - source venv/bin/activate
    - cd app/
    - >
      pytest -m "not e2e" 
      --junit-xml=reports/junit.xml 
      --cov=. 
      --cov-report=term 
      --cov-report=xml:reports/coverage.xml
  coverage: /TOTAL\s+\d+\s+\d+\s+(\d+%)/
  cache:
    key: cache-deps-${CI_COMMIT_BRANCH}
    policy: pull
    untracked: true
  artifacts:
    when: always
    access: all
    expire_in: 1 hour
    paths:
      - app/reports/coverage.xml
    reports:
      junit: app/reports/junit.xml
      coverage_report:
        coverage_format: cobertura
        path: app/reports/coverage.xml

# ".": préfixer un job avec un "." le désactive
.sonar:
  tags:
    - formation
  stage: qualifying
  image:
    name: sonarsource/sonar-scanner-cli:12
    ## REM: la clé image est "polymorphique" et peut contenir une str ou un map
    # à l'époque: on devait neutraliser l'entrypoint
    # entrypoint: [""]
  script:
    # on peut aussi exclure des dossiers: -Dsonar.exclusions=app/tests/**
    # on peut assu exlucre des dossiers du coverage: -Dsonar.coverage.exclusions=**/tests/*
    # OU dans projet -> project settings -> General Settings -> Analysis Scope
    - >
      sonar-scanner
      -Dsonar.projectKey=dev
      -Dsonar.sources=./app
      -Dsonar.host.url=http://gitlab.lan.fr:9000
      -Dsonar.login=${SONAR_TOKEN}
      -Dsonar.python.coverage.reportPaths=app/reports/coverage.xml
      -Dsonar.qualitygate.wait=true

package:
  tags:
    - formation
  stage: packaging
  image: mrnonz/alpine-git-curl
  script:
    - >
      git archive 
      --prefix=$CI_COMMIT_TAG 
      -o $CI_COMMIT_TAG.tar.gz $CI_COMMIT_TAG
    # upload l'archive dans le registre de paquet générique de gitlab
    # Deploy -> Packages registry <Generic> (https://docs.gitlab.com/user/packages/generic_packages/?tab=CI%2FCD+job+token)
    - ls -al
    - >
      curl 
      -L -k
      --header "JOB-TOKEN: ${CI_JOB_TOKEN}"
      --upload-file ${CI_COMMIT_TAG}.tar.gz
      "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic/dev/${CI_COMMIT_TAG}/${CI_COMMIT_TAG}.tar.gz"
  rules:
    - if: $CI_COMMIT_TAG =~ /v\d+\.\d+/