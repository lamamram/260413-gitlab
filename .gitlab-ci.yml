# variables globales du pipeline
variables:
  # variables surchargeables (ex: exécution manuelle)
  CICD_IMAGE_TAG: 3.14.4-slim-trixie

generate deps:
  tags:
    - formation
  image: python:${CICD_IMAGE_TAG}
  script:
    - python -m venv venv
    - source venv/bin/activate
    - pip install -r app/requirements.txt
    - pip install -r app/requirements-dev.txt

test:
  tags:
    - formation
  image: python:${CICD_IMAGE_TAG}
  script:
    - source venv/bin/activate
    - cd app/
    - pytest -m "not e2e"