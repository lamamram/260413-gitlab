# &: référence à une ancre ou un alias YAML
.tag_rules: &tag_rules
  - if: $CI_COMMIT_TAG =~ /v\d+\.\d+/

.use_cache: &use_cache
  key: cache-deps-${CI_COMMIT_BRANCH}
  policy: pull
  untracked: true

image: ${CI_REGISTRY_IMAGE}/python:${CICD_IMAGE_TAG}

variables:
  CICD_IMAGE_TAG: 3.14.4-slim-trixie
  TRIGGER_CACHE: "off"

stages:
  - installing
  - testing
  - qualifying
  - packaging
  - staging
  - browsing
  - deploying

# https://gitlab.com/nagyv/gitlab-opencode
# le /opencode correspond au dossier templates/opencode.yml et le @main correspond à la branche du projet gitlab-opencode
.include:
  - component: gitlab.lan.fr/formation/gitlab-opencode/opencode@main
    # surcharge des variables d'entrée du template opencode
    inputs:
      # dossier de configuration classique d'opencode
      config_dir: ${CI_PROJECT_DIR}/.opencode
      stage: testing
      # variables cachées qui contient le contenu du fichier ~/.local/share/opencode/auth.json 
      # en tant que variable "File" et non masquée
      auth_json: ./auth.json
      message: "give me the capital of France"

generate deps:
  tags:
    - formation
  stage: installing
  script:
    - python -m venv venv
    - source venv/bin/activate
    - pip install -r app/requirements.txt
    - pip install -r app/requirements-dev.txt
  cache:
    key: cache-deps-${CI_COMMIT_BRANCH}
    paths:
      - venv/
    policy: push
  rules:
    - changes:
        - app/requirements.txt
        - app/requirements-dev.txt
    - if: $TRIGGER_CACHE == "on"


test:
  tags:
    - formation
  stage: testing
  script:
    - source venv/bin/activate
    - cd app/
    - >
      pytest -m "not e2e and not e1e"
      --junit-xml=reports/junit.xml 
      --cov=. 
      --cov-report=term 
      --cov-report=xml:reports/coverage.xml
  coverage: /TOTAL\s+\d+\s+\d+\s+(\d+%)/
  cache: *use_cache
  artifacts:
    when: always
    access: all
    expire_in: 1 hour
    paths:
      - app/reports/coverage.xml
    reports:
      junit: app/reports/junit.xml
      coverage_report:
        coverage_format: cobertura
        path: app/reports/coverage.xml

sonar:
  tags:
    - formation
  stage: qualifying
  image:
    name: sonarsource/sonar-scanner-cli:12
  script:
    - >
      sonar-scanner
      -Dsonar.projectKey=dev
      -Dsonar.sources=./app
      -Dsonar.host.url=http://gitlab.lan.fr:9000
      -Dsonar.login=${SONAR_TOKEN}
      -Dsonar.python.coverage.reportPaths=app/reports/coverage.xml
      -Dsonar.qualitygate.wait=true

package:
  tags:
    - formation
  stage: packaging
  image: mrnonz/alpine-git-curl
  script:
    - >
      git archive 
      --prefix=$CI_COMMIT_TAG/
      -o $CI_COMMIT_TAG.tar.gz $CI_COMMIT_TAG
    - >
      curl 
      -L -k
      --header "JOB-TOKEN: ${CI_JOB_TOKEN}"
      --upload-file ${CI_COMMIT_TAG}.tar.gz
      "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic/dev/${CI_COMMIT_TAG}/${CI_COMMIT_TAG}.tar.gz"
  # alias yaml *<ref>: on réutilise tel quel le contenu d'une clé référencée
  rules: *tag_rules

release:
  stage: packaging
  image: registry.gitlab.com/gitlab-org/cli:latest
  ### PB de tls non signé (worarounds: https://docs.gitlab.com/runner/configuration/tls-self-signed/)
  before_script:
    - apk --no-cache add openssl ca-certificates
    - mkdir -p /usr/local/share/ca-certificates/extra
    - openssl s_client -connect ${CI_SERVER_HOST}:${CI_SERVER_PORT} -servername ${CI_SERVER_HOST} -showcerts </dev/null 2>/dev/null | sed -e '/-----BEGIN/,/-----END/!d' | tee "/usr/local/share/ca-certificates/${CI_SERVER_HOST}.crt" >/dev/null
    - update-ca-certificates
  script:
    - echo "running release_job"
  release:
    tag_name: '$CI_COMMIT_TAG'
    description: '$CI_COMMIT_TAG'
  rules: *tag_rules

.trigger_staging:
  stage: staging
  trigger:
    project: formation/ops
    branch: main
    strategy: depend
  environment:
    name: staging
    url: https://dawan.fr
  rules: *tag_rules

e2e:
  stage: browsing
  tags:
    - formation
  # conteneur "sidecars" créés à la volée pour fournir des services au job
  services:
    - name: selenium/standalone-firefox:144.0-geckodriver-0.36-20260202
      # DNS du service => pour connecter le client au serveur
      alias: selenium-server
  script:
    - source venv/bin/activate
    - cd app/
    - >
      pytest -m "e2e"
      --html=reports/e2e.html
    - ls -al reports/
  artifacts:
    when: always
    access: all
    expire_in: 1 hour
    ## PIS ALLER: il faudrait configurer le serveur gitlab pour servir les rapports statiques (html, xml, etc.) générés par les jobs
    ## GITLAB PAGES: https://docs.gitlab.com/ee/user/project/pages/
    paths:
      - app/reports/
  cache: *use_cache
  rules:
    - if: $CI_COMMIT_TAG =~ /^v\d+\.\d+$/ || $CI_COMMIT_BRANCH == "main"

production:
  stage: deploying
  tags:
    - formation
  script:
    - echo "deploy to production"
  environment:
    name: production
    url: https://dawan.fr
  rules:
    - if: $CI_COMMIT_TAG =~ /^v\d+\.\d+$/ || $CI_COMMIT_BRANCH == "main"
      when: manual
