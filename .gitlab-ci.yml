image: ${CI_REGISTRY_IMAGE}/python:${CICD_IMAGE_TAG}

variables:
  CICD_IMAGE_TAG: 3.14.4-slim-trixie
  TRIGGER_CACHE: "off"

stages:
  - installing
  - testing
  - qualifying
  - packaging
  - staging

generate deps:
  tags:
    - formation
  stage: installing
  script:
    - python -m venv venv
    - source venv/bin/activate
    - pip install -r app/requirements.txt
    - pip install -r app/requirements-dev.txt
  cache:
    key: cache-deps-${CI_COMMIT_BRANCH}
    paths:
      - venv/
    policy: push
  rules:
    - changes:
        - app/requirements.txt
        - app/requirements-dev.txt
    - if: $TRIGGER_CACHE == "on"


.test:
  tags:
    - formation
  stage: testing
  script:
    - source venv/bin/activate
    - cd app/
    - >
      pytest -m "not e2e" 
      --junit-xml=reports/junit.xml 
      --cov=. 
      --cov-report=term 
      --cov-report=xml:reports/coverage.xml
  coverage: /TOTAL\s+\d+\s+\d+\s+(\d+%)/
  cache:
    key: cache-deps-${CI_COMMIT_BRANCH}
    policy: pull
    untracked: true
  artifacts:
    when: always
    access: all
    expire_in: 1 hour
    paths:
      - app/reports/coverage.xml
    reports:
      junit: app/reports/junit.xml
      coverage_report:
        coverage_format: cobertura
        path: app/reports/coverage.xml

.sonar:
  tags:
    - formation
  stage: qualifying
  image:
    name: sonarsource/sonar-scanner-cli:12
  script:
    - >
      sonar-scanner
      -Dsonar.projectKey=dev
      -Dsonar.sources=./app
      -Dsonar.host.url=http://gitlab.lan.fr:9000
      -Dsonar.login=${SONAR_TOKEN}
      -Dsonar.python.coverage.reportPaths=app/reports/coverage.xml
      -Dsonar.qualitygate.wait=true

package:
  tags:
    - formation
  stage: packaging
  image: mrnonz/alpine-git-curl
  script:
    - >
      git archive 
      --prefix=$CI_COMMIT_TAG 
      -o $CI_COMMIT_TAG.tar.gz $CI_COMMIT_TAG
    - >
      curl 
      -L -k
      --header "JOB-TOKEN: ${CI_JOB_TOKEN}"
      --upload-file ${CI_COMMIT_TAG}.tar.gz
      "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic/dev/${CI_COMMIT_TAG}/${CI_COMMIT_TAG}.tar.gz"
  rules:
    - if: $CI_COMMIT_TAG =~ /v\d+\.\d+/

## ceci n'est pas un job, mais un déclenchement de pipeline (multi-project pipeline)
trigger_staging:
  stage: staging
  # trigger != script
  trigger:
    project: formation/ops
    branch: main
    # le pipeline déclenché bloque le pipeline courant
    strategy: depend
  environment:
    # staging et prod sont des environnements "en dur" dans gitlab
    # staging et prod sont des termes consacrés
    # mais on peut aussi les créer dynamiquement
    name: staging
    url: https://dawan.fr
  rules:
    - if: $CI_COMMIT_TAG =~ /v\d+\.\d+/
