variables:
  CICD_IMAGE_TAG: 3.14.4-slim-trixie

stages:
  - installing
  - testing

generate deps:
  tags:
    - formation
  stage: installing
  image: python:${CICD_IMAGE_TAG}
  script:
    - python -m venv venv
    - source venv/bin/activate
    - pip install -r app/requirements.txt
    - pip install -r app/requirements-dev.txt
  # cache de récolte du dossier venv, pour le placer dans un volume
  cache:
    # utilisation d'une variable prédéfinie pour dynamiser le nom du cache
    # métier: pour préserver le cache de la branche main
    key: cache-deps-${CI_COMMIT_BRANCH}
    paths:
      - venv/
    # création pure
    policy: push


test:
  tags:
    - formation
  stage: testing
  image: python:${CICD_IMAGE_TAG}
  script:
    - source venv/bin/activate
    - cd app/
    - pytest -m "not e2e"
  # cache d'utilisation du cache
  cache:
    key: cache-deps-${CI_COMMIT_BRANCH}
    # utilisation pure
    policy: pull
    # justification: $GIT_STRATEGY (settings -> CICD -> General pipelines) 
    # est à fetch, donc le code source est réutilisé mais il est nettoyé avec git clean -xf
    # MAIS comme le cache arrive nécessairement Untracked ou ignoré et donc il est dégagé !!!
    # donc untracked: true pour préserver le cache
    untracked: true