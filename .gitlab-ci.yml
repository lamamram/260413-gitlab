variables:
  CICD_IMAGE_TAG: 3.14.4-slim-trixie

# stages: grandes étapes du pipeline, elles sont exécutées dans l'ordre
stages:
  - installing
  - testing

generate deps:
  tags:
    - formation
  stage: installing
  image: python:${CICD_IMAGE_TAG}
  script:
    - python -m venv venv
    - source venv/bin/activate
    - pip install -r app/requirements.txt
    - pip install -r app/requirements-dev.txt

test:
  tags:
    - formation
  stage: testing
  image: python:${CICD_IMAGE_TAG}
  script:
    - source venv/bin/activate
    - cd app/
    - pytest -m "not e2e"