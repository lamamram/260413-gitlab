variables:
  CICD_IMAGE_TAG: 3.14.4-slim-trixie

stages:
  - installing
  - testing

generate deps:
  tags:
    - formation
  stage: installing
  image: python:${CICD_IMAGE_TAG}
  script:
    - python -m venv venv
    - source venv/bin/activate
    - pip install -r app/requirements.txt
    - pip install -r app/requirements-dev.txt
  cache:
    key: cache-deps-${CI_COMMIT_BRANCH}
    paths:
      - venv/
    policy: push
  # rules: liste de règles. chaque règle vraie permet d'exécuter le job (OU)
  rules:
    # toutes les clauses d'une règle doivent être vraies pour que la règle soit vraie (ET)
    # changes: si l'un des fichiers listés a été modifié, la clause est vraie
    - changes:
        - app/requirements.txt
        - app/requirements-dev.txt


test:
  tags:
    - formation
  stage: testing
  image: python:${CICD_IMAGE_TAG}
  script:
    - source venv/bin/activate
    - cd app/
    - pytest -m "not e2e"
  cache:
    key: cache-deps-${CI_COMMIT_BRANCH}
    policy: pull
    untracked: true